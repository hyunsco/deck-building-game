<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>E2E drag&drop harness</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div id="app">
    <div id="stage">
      <div id="topbar"></div>
      <div id="relicbar"></div>
      <div id="screen"></div>
      <div id="fxlayer"></div>
      <div id="tooltip"></div>
      <div id="fatal"></div>
    </div>
  </div>
  <div id="report">pending</div>
  <script type="module">
    import { mulberry32 } from '../js/rng.js';
    import { starterDeck, makeCard } from '../js/data/cards.js';
    import { runCombat } from '../js/combatui.js';
    import { initTooltips } from '../js/ui.js';

    const report = [];
    const flush = () => { document.getElementById('report').textContent = report.join(' | '); };
    const pass = (cond, label) => { report.push((cond ? 'PASS:' : 'FAIL:') + label); flush(); };
    window.addEventListener('error', (ev) => { report.push('ERROR: ' + ev.message); flush(); });

    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
    const center = (el) => {
      const r = el.getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    };
    const fire = (target, type, pt, extra = {}) => {
      target.dispatchEvent(new PointerEvent(type, {
        bubbles: true, cancelable: true, pointerId: 1, isPrimary: true,
        clientX: pt.x, clientY: pt.y, ...extra,
      }));
    };
    const key = (k, code) => document.dispatchEvent(new KeyboardEvent('keydown', { key: k, code: code || '', bubbles: true }));
    const q = (sel) => document.querySelector(sel);
    const qa = (sel) => [...document.querySelectorAll(sel)];

    const energy = () => Number(q('.energy-orb b')?.textContent ?? -1);
    const discardCount = () => Number(q('.pile-btn.discard b')?.textContent ?? -1);
    const handCount = () => qa('.hand .card').length;
    const enemyHp = (i) => {
      const u = qa('.unit.enemy')[i];
      return u ? Number(u.querySelector('.hp-num').textContent.split('/')[0]) : -1;
    };

    // 마우스 드래그: down(카드) → move(여러 단계) → up(목적지)
    async function dragTo(cardEl, destPt) {
      const from = center(cardEl);
      fire(cardEl, 'pointerdown', from);
      await sleep(30);
      const steps = 6;
      for (let i = 1; i <= steps; i++) {
        fire(document, 'pointermove', {
          x: from.x + (destPt.x - from.x) * i / steps,
          y: from.y + (destPt.y - from.y) * i / steps,
        });
        await sleep(16);
      }
      fire(document, 'pointerup', destPt);
      await sleep(900); // 연출 대기
    }

    initTooltips();
    const rng = mulberry32(2024);
    const run = {
      act: 1, hp: 80, maxHp: 80, gold: 99,
      // 손패 5장이 모두 예측 가능하도록 타격/수비만으로 구성
      deck: [makeCard('strike'), makeCard('strike'), makeCard('defend'), makeCard('defend'), makeCard('strike')],
      relics: ['burningBlood'],
      potions: [null, null, null],
      counters: { penNib: 0 }, monstersSlain: 0, elitesSlain: 0, bossesSlain: 0,
    };

    runCombat(run, ['cultist', 'jawWorm'], rng, 'monster');

    (async () => {
      await sleep(1500); // 전투 시작 연출 대기

      pass(handCount() === 5, 'hand has 5 cards');
      pass(energy() === 3, 'energy starts at 3');
      pass(qa('.unit.enemy').length === 2, 'two enemies rendered');
      pass(qa('.hand .card .card-key').length === 5, 'number badges shown');
      // 설명 텍스트는 단일 래퍼(<span class=desc-text>)여야 세로 깨짐이 없다
      pass(qa('.hand .card .card-desc > .desc-text').length === 5, 'card descriptions wrapped (no vertical break)');
      pass(qa('.hand .card .card-desc .kw[data-tip]').length >= 1, 'keyword tooltips attached');
      pass(!!q('.speed-btn'), 'speed toggle button present');

      // ① 공격 카드를 적에게 드래그 앤 드랍 (호버 시 예상 피해 표시 확인)
      let strike = qa('.hand .card.type-attack')[0];
      const enemy0 = qa('.unit.enemy')[0];
      const hpBefore = enemyHp(0);
      {
        const from = center(strike);
        const dest = center(enemy0.querySelector('.sprite'));
        fire(strike, 'pointerdown', from);
        await sleep(30);
        for (let i = 1; i <= 6; i++) {
          fire(document, 'pointermove', { x: from.x + (dest.x - from.x) * i / 6, y: from.y + (dest.y - from.y) * i / 6 });
          await sleep(16);
        }
        pass(!!q('.dmg-preview') && q('.dmg-preview').textContent === '6', 'damage preview shown on hover (6)');
        fire(document, 'pointerup', dest);
        await sleep(900);
      }
      pass(enemyHp(0) === hpBefore - 6, `attack drag-drop on enemy deals 6 (${hpBefore}→${enemyHp(0)})`);
      pass(energy() === 2, 'energy spent (3→2)');
      pass(handCount() === 4, 'card left hand');

      // ② 스킬(수비)을 전장(앞쪽)으로 꺼내서 드랍
      const defend = qa('.hand .card.type-skill')[0];
      const field = q('.battlefield');
      const fr = field.getBoundingClientRect();
      await dragTo(defend, { x: fr.left + fr.width * 0.5, y: fr.top + fr.height * 0.45 });
      const blockBadge = q('.unit.player .block-badge');
      pass(!!blockBadge && Number(blockBadge.textContent) === 5, 'skill zone-drop grants 5 block');
      pass(energy() === 1, 'energy spent (2→1)');

      // ③ 단일 대상 공격을 (적이 2명일 때) 전장에 드랍 → 거부되어야 함
      strike = qa('.hand .card.type-attack')[0];
      const handBefore3 = handCount();
      const dBefore3 = discardCount();
      await dragTo(strike, { x: fr.left + fr.width * 0.5, y: fr.top + fr.height * 0.45 });
      pass(handCount() === handBefore3 && discardCount() === dBefore3, 'single-target zone-drop rejected with 2 enemies');
      // 드래그가 유지되는 사양 → ESC로 정리
      key('Escape');
      await sleep(200);
      pass(handCount() === handBefore3, 'esc returns card to hand');

      // ③-1 드래그 내성: 드래그 중 손패가 재렌더링되지 않고(원본 보존) pointercancel 시 정리
      {
        const cardEl3 = qa('.hand .card')[0];
        const from = center(cardEl3);
        fire(cardEl3, 'pointerdown', from);
        await sleep(30);
        fire(document, 'pointermove', { x: from.x + 40, y: from.y - 80 });
        await sleep(60);
        pass(qa('.hand .card').length === handBefore3 && !!q('.hand .card.ghost-origin'),
          'hand preserved during drag (origin hidden, not re-rendered)');
        document.dispatchEvent(new PointerEvent('pointercancel', { bubbles: true, pointerId: 1 }));
        await sleep(250);
        pass(!q('.card.drag-ghost') && !q('.hand .card.ghost-origin'), 'pointercancel cleans up drag');
      }

      // ④ 숫자키로 카드 집기 → 마우스 클릭으로 드랍 (적 위)
      const cards = qa('.hand .card');
      const attackIdx = cards.findIndex((cd) => cd.classList.contains('type-attack'));
      const badge = cards[attackIdx].querySelector('.card-key').textContent;
      const hpBefore4 = enemyHp(0);
      key(badge);
      await sleep(200);
      pass(!!q('.card.drag-ghost'), `number key ${badge} picks up card (ghost visible)`);
      const target = qa('.unit.enemy')[0];
      const tp = center(target.querySelector('.sprite'));
      fire(document, 'pointermove', tp);
      await sleep(100);
      fire(target, 'pointerdown', tp); // 마우스 클릭으로 드랍
      await sleep(900);
      pass(enemyHp(0) === hpBefore4 - 6, `key-picked card dropped on enemy (${hpBefore4}→${enemyHp(0)})`);
      pass(energy() === 0, 'energy spent (1→0)');

      // ⑤ 제자리 클릭(드래그 없이) → 취소되어 손으로 복귀
      const last = qa('.hand .card')[0];
      const lp = center(last);
      const handBefore5 = handCount();
      fire(last, 'pointerdown', lp);
      await sleep(40);
      fire(document, 'pointerup', lp);
      await sleep(300);
      pass(handCount() === handBefore5, 'click-in-place cancels (card stays)');

      // ⑥ E 키로 턴 종료 — 한글 IME 상태(key='ㄷ', code='KeyE')로 시뮬레이션
      key('ㄷ', 'KeyE');
      await sleep(6000);
      pass(energy() === 3, 'E key (Korean IME) ends turn — energy refilled to 3');
      pass(handCount() === 5, 'new hand drawn (5 cards)');

      // ⑦ 더미 오버레이가 ESC로 닫히는지
      q('.pile-btn.discard').click();
      await sleep(200);
      pass(!!q('.overlay'), 'discard pile overlay opens');
      key('Escape');
      await sleep(200);
      pass(!q('.overlay'), 'overlay closes with ESC');

      report.push('E2E_DONE');
      flush();
    })();
  </script>
</body>
</html>
