<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>UI harness</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div id="app">
    <div id="stage">
      <div id="topbar"></div>
      <div id="relicbar"></div>
      <div id="screen"></div>
      <div id="fxlayer"></div>
      <div id="tooltip"></div>
      <div id="fatal"></div>
    </div>
  </div>
  <div id="report">pending</div>
  <script type="module">
    import { mulberry32 } from '../js/rng.js';
    import { starterDeck, makeCard } from '../js/data/cards.js';
    import { generateMap } from '../js/map.js';
    import { runCombat } from '../js/combatui.js';
    import { mapScreen, restScreen } from '../js/screens.js';
    import { initTooltips } from '../js/ui.js';

    const report = [];
    const flush = () => { document.getElementById('report').textContent = report.join(' | '); };
    window.addEventListener('error', (ev) => { report.push('ERROR: ' + ev.message); flush(); });

    initTooltips();
    const rng = mulberry32(123);
    const run = {
      hp: 80, maxHp: 80, gold: 99,
      deck: [...starterDeck(), makeCard('whirlwind'), makeCard('metallicize')],
      relics: ['burningBlood', 'anchor', 'penNib'],
      potions: ['firePotion', null, null],
      map: generateMap(mulberry32(5)),
      pos: null, path: [],
      act: 1, counters: { penNib: 0 }, monstersSlain: 0, elitesSlain: 0, bossesSlain: 0,
    };

    // 1) combat screen renders (not awaited — we only inspect the DOM)
    runCombat(run, ['cultist', 'jawWorm'], rng, 'monster');
    setTimeout(() => {
      const checks = {
        cards: document.querySelectorAll('.hand .card').length,
        enemies: document.querySelectorAll('.unit.enemy').length,
        intents: document.querySelectorAll('.intent').length,
        orb: document.querySelectorAll('.energy-orb').length,
        relics: document.querySelectorAll('.relic').length,
        endturn: document.querySelectorAll('.end-turn').length,
      };
      report.push('combat ' + JSON.stringify(checks));
      const pass1 = checks.cards === 5 && checks.enemies === 2 && checks.intents === 2 && checks.orb === 1 && checks.relics === 3 && checks.endturn === 1;
      report.push(pass1 ? 'COMBAT_OK' : 'COMBAT_BAD');

      // 2) map screen renders
      mapScreen(run);
      setTimeout(async () => {
        const m = {
          nodes: document.querySelectorAll('.map-node').length,
          clickable: document.querySelectorAll('.map-node.clickable').length,
          edges: document.querySelectorAll('.map-edge').length,
        };
        report.push('map ' + JSON.stringify(m));
        report.push(m.nodes > 30 && m.clickable >= 1 && m.edges > 30 ? 'MAP_OK' : 'MAP_BAD');
        flush();

        // 3) 휴식처 — 단련: 카드 선택 → 강화 미리보기 → 확정 플로우
        const sleep2 = (ms) => new Promise((r) => setTimeout(r, ms));
        restScreen(run);
        await sleep2(300);
        const smith = [...document.querySelectorAll('.rest-option')].find((b) => b.textContent.includes('단련'));
        smith.click();
        await sleep2(250);
        const firstPick = document.querySelector('.card-grid .card.pickable');
        const pickedUid = Number(firstPick.dataset.uid);
        firstPick.click();
        await sleep2(250);
        const compareCards = document.querySelectorAll('.choice-row.compare .card');
        const labels = document.querySelectorAll('.compare-label');
        report.push(compareCards.length === 2 && labels.length === 2 ? 'UPGRADE_PREVIEW_OK' : 'UPGRADE_PREVIEW_BAD');
        const before = run.deck.find((cd) => cd.uid === pickedUid);
        report.push(!before.upgraded ? 'NOT_YET_UPGRADED_OK' : 'PREMATURE_UPGRADE_BAD');
        // 취소 → 카드 그대로
        [...document.querySelectorAll('.skip-btn')].find((b) => b.textContent === '취소').click();
        await sleep2(250);
        report.push(!before.upgraded ? 'CANCEL_KEEPS_CARD_OK' : 'CANCEL_BAD');
        // 다시 선택 → 확정 → 강화됨
        document.querySelector('.card-grid .card.pickable').click();
        await sleep2(250);
        [...document.querySelectorAll('.proceed-btn')].find((b) => b.textContent.includes('강화 확정')).click();
        await sleep2(250);
        const after = run.deck.find((cd) => cd.uid === pickedUid);
        report.push(after.upgraded ? 'CONFIRM_UPGRADES_OK' : 'CONFIRM_BAD');
        flush();
      }, 300);
    }, 1200);
  </script>
</body>
</html>
